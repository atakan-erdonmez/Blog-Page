# .github/workflows/test-read-vault.yml
name: Test Read Vault

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: atakan-erdonmez/vault
          token: ${{ secrets.VAULT_READ_TOKEN }}
          path: vault

      - name: List blog posts
        run: ls -la vault/20_Blogs/Posts
